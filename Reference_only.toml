baseURL = "https://fabianhee.com"
title = "Welcome"
theme = "blowfish"

[params]
  colorScheme = "midnight" # Deep blues/blacks - fits the Guilty Gear UI
  defaultAppearance = "dark"
  showSummary = true
  showTableOfContents = true
  
  # Brand Customization
  [params.header]
    showLogo = true
    showMenu = true
  
  [params.footer]
    showCopyright = true
    showPoweredBy = false

  # Homepage Layout (Perfect for YouTube embeds)
  [params.homepage]
    layout = "background" # Large hero image for your latest video
    showRecent = true
    showRecentItems = 5
    cardView = true

