name: build-deploy
on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Cache
        uses: actions/cache@v4
        with:
          path: |
            /tmp/hugo_cache
            public
          # The key changes when your config or lock files change
          key: ${{ runner.os }}-hugo-${{ hashFiles('**/go.sum', '**/package-lock.json', '**/config.toml') }}
          restore-keys: |
            ${{ runner.os }}-hugo-

      - name: Setup Go
        uses: actions/setup-go@v5.3.0
        with:
          go-version: '1.25.8'

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3.0.0
        with:
          hugo-version: '0.157.0'
          extended: true

      - name: Build Site
        run: hugo --gc --minify --cacheDir /tmp/hugo_cache

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3.14.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=fabianhee-website
