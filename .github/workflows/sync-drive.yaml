name: Sync Blog from Google Drive

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT_FOR_BYPASS }}

      - name: Cache Rclone
        id: cache-rclone
        uses: actions/cache@v4
        with:
          path: /usr/bin/rclone
          # This key ensures that if the OS changes, the cache resets
          key: ${{ runner.os }}-rclone

      - name: Install Rclone
        # Only runs if the cache was NOT found (cache-hit != 'true')
        if: steps.cache-rclone.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/${{ secrets.GCLOUD_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: '${{ secrets.GCLOUD_SERVICE_ACCOUNT }}'
          token_format: 'access_token'
          access_token_scopes: 'https://www.googleapis.com/auth/drive.readonly'

      - name: Configure Rclone
        run: |
          mkdir -p ~/.config/rclone
          cat <<EOF > ~/.config/rclone/rclone.conf
          [gdrive]
          type = drive
          scope = drive.readonly
          token = {"access_token":"${{ steps.auth.outputs.access_token }}","token_type":"Bearer","expiry":"$(date -d '1 hour' --iso-8601=seconds)"}
          root_folder_id = ${{ secrets.GDRIVE_FOLDER_ID }}
          EOF

      - name: Sync Drive to Blog Directory
        run: |
          rclone sync gdrive: ./content/blog --verbose --drive-use-trash=false

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          CURRENT_BRANCH=${GITHUB_REF##*/}
          
          git add content/blog/
          
          if [ -n "$(git status --porcelain content/blog/)" ]; then
            git commit -m "Automated Sync: Updating $CURRENT_BRANCH with Drive content"
            git push origin HEAD:$CURRENT_BRANCH
          else
            echo "No changes detected on $CURRENT_BRANCH."
          fi
