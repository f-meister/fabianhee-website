name: Sync Blog from Google Drive

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT_FOR_BYPASS }}

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3.0.0
        with:
          hugo-version: '0.157.0'
          extended: true

      - name: Cache Rclone
        id: cache-rclone
        uses: actions/cache@v4
        with:
          # Cache a local folder in your home directory instead of /usr/bin
          path: ~/rclone_bin
          key: ${{ runner.os }}-rclone-v1

      - name: Install Rclone
        if: steps.cache-rclone.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/rclone_bin
          sudo apt-get update
          sudo apt-get install -y rclone
          # Copy the binary from the system path to our cached home path
          cp /usr/bin/rclone ~/rclone_bin/rclone

      - name: Setup Rclone Path
        run: |
          # Make the cached binary executable and add it to the Runner's PATH
          chmod +x ~/rclone_bin/rclone
          echo "$HOME/rclone_bin" >> $GITHUB_PATH

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/${{ secrets.GCLOUD_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: '${{ secrets.GCLOUD_SERVICE_ACCOUNT }}'
          token_format: 'access_token'
          access_token_scopes: 'https://www.googleapis.com/auth/drive.readonly'

      - name: Configure Rclone
        run: |
          mkdir -p ~/.config/rclone
          cat <<EOF > ~/.config/rclone/rclone.conf
          [gdrive]
          type = drive
          scope = drive.readonly
          token = {"access_token":"${{ steps.auth.outputs.access_token }}","token_type":"Bearer","expiry":"$(date -d '1 hour' --iso-8601=seconds)"}
          root_folder_id = ${{ secrets.GDRIVE_FOLDER_ID }}
          EOF

      - name: Sync Drive to Blog Directory
        run: |
          rclone sync gdrive: ./content/blog --verbose --drive-use-trash=false

      - name: Build Site
        run: hugo --minify

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=YOUR_PROJECT_NAME
