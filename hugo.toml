baseURL = "https://fabianhee.com"
title = "Fabian Hee"
theme = "blowfish"

[params]
  colorScheme = "midnight" # Deep blues/blacks - fits the Guilty Gear UI
  defaultAppearance = "dark"
  showSummary = true
  showTableOfContents = true
  
  # Brand Customization
  [params.header]
    showLogo = true
    showMenu = true
  
  [params.footer]
    showCopyright = true
    showPoweredBy = false

  # Homepage Layout (Perfect for YouTube embeds)
  [params.homepage]
    layout = "background" # Large hero image for your latest video
    showRecent = true
    showRecentItems = 5
    cardView = true

[menu]
  [[menu.main]]
    name = "blog"
    url = "/tags/guilty-gear/"
    weight = 10
  [[menu.main]]
    name = "portfolio"
    url = "/tags/jrpg/"
    weight = 20
  [[menu.main]]
    name = "tastyfab"
    url = "https://youtube.com/@tastyfab"
    weight = 30
