{{ define "main" }}
<section class="mt-8">
  {{/* Centering wrapper for the entire page content */}}
  <div class="flex flex-col items-center text-center mx-auto max-w-4xl px-6">
    
    <header class="mb-10">
      <h1 class="text-4xl font-extrabold text-neutral-900 dark:text-white">
        {{ .Title }}
      </h1>
      {{ if .Params.description }}
      <p class="mt-4 text-lg text-neutral-500 dark:text-neutral-400">
        {{ .Params.description }}
      </p>
      {{ end }}
    </header>

    {{/* This renders your Markdown content and Shortcodes */}}
    <article class="prose dark:prose-invert w-full max-w-none">
      {{ .Content }}
    </article>

  </div>
</section>
{{ end }}
