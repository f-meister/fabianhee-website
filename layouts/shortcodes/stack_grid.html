{{ $data := .Site.Data.stack }}

<div class="not-prose mt-16">
  {{ range $data }}
  <div class="mb-12">
    <h3 class="text-center text-sm font-bold uppercase tracking-widest opacity-50 mb-6">{{ .category }}</h3>
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
      {{ range .tools }}
      <div class="p-4 rounded-xl border border-neutral-200 dark:border-neutral-800 bg-neutral-50 dark:bg-neutral-900/50 text-center">
        <div class="font-semibold text-base mb-1">{{ .name }}</div>
        <div class="text-xs opacity-60">{{ .level }}</div>
      </div>
      {{ end }}
    </div>
  </div>
  {{ end }}
</div>
