        {{ $items := .Site.Data.tech.articles }}

        {{ $style := resources.Get "css/custom-grid.css" | minify | fingerprint }}
        <link rel="stylesheet" href="{{ $style.RelPermalink }}">

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 my-8 max-w-[800px] mx-auto">
        {{ range $items }}
        <div class="group flex flex-col bg-neutral-100 dark:bg-neutral-800 rounded-xl overflow-hidden shadow-sm hover:shadow-md transition-all">
            <a href="{{ .link }}" target="_blank" class="no-underline flex flex-col h-full">
            
            {{/* Article Image */}}
            <div class="aspect-video overflow-hidden bg-neutral-200 dark:bg-neutral-700">
            <img 
                src="{{ .image }}" 
                alt="{{ .title }}" 
                class="tech-grid-img group-hover:scale-105 transition-transform duration-500"
                style="pointer-events: none !important; cursor: default !important;"
            />
            </div>

            {{/* Article Content */}}
            <div class="p-4 flex flex-col flex-grow text-left">
                <div class="flex justify-between items-center mb-2">
                <span class="text-[10px] font-bold lowercase tracking-widest text-primary-500">{{ .platform }}</span>
                <span class="text-[10px] text-neutral-400">{{ .date }}</span>
                </div>
                <h3 class="text-base font-bold mb-2 leading-tight dark:text-white group-hover:text-primary-500 transition-colors">{{ .title }}</h3>
                <p class="text-xs text-neutral-600 dark:text-neutral-400 line-clamp-3">{{ .description }}</p>
            </div>
            
            </a>
        </div>
        {{ end }}
        </div>
