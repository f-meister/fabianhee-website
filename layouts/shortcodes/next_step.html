<div style="margin: 80px auto 100px; text-align: center; max-width: 900px; border-top: 1px solid rgba(128,128,128,0.1); padding-top: 60px; font-family: sans-serif;">
  <p style="font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.5; margin-bottom: 30px; color: currentColor;">
    What's Next?
  </p>

  <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 30px;">
    
    {{ range $index, $element := .Params }}
      {{/* We only want to start a new button on EVEN indexes (0, 2, 4...) */}}
      {{ if (modBool $index 2) }}
        
        {{ $url := $element }}
        {{ $label := (index $.Params (add $index 1)) }}
        
        {{ if and $url $label }}
        <div style="flex: 1; min-width: 180px; max-width: 300px; margin-bottom: 20px;">
          <a href="{{ $url }}" style="font-size: 1.25rem; font-weight: 800; color: #3b82f6; text-decoration: none; display: block; line-height: 1.3;">
            {{ $label }} <span style="display: block; margin-top: 5px; font-size: 1.5rem;">→</span>
          </a>
        </div>
        {{ end }}

      {{ end }}
    {{ end }}

  </div>
</div>
