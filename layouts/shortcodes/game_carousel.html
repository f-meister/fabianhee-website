{{ $year := .Get "year" }}
{{ $id := printf "carousel-%s" $year }}
{{ $games := where .Site.Data.games "year" (int $year) }}

<style>
  /* This targets the parent container provided by the theme */
  :host, .prose, article {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    width: 100%;
    max-width: 100% !important;
  }
  
  h1, h2 {
    width: 100%;
    text-align: center;
    margin-top: 2rem !important;
  }
  .carousel-fixed-container {
    width: 100%;
    max-width: 900px;
    margin: 2rem auto;
    aspect-ratio: 16 / 9;
    position: relative;
    overflow: hidden;
    border-radius: 16px;
    background: #000;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
  .carousel-track {
    display: flex;
    height: 100%;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .carousel-slide {
    min-width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .carousel-slide img {
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    object-fit: contain; /* Prevents the "halfway generated" look */
    cursor: default !important; /* Removes the "zoom" magnifying glass */
    pointer-events: none; /* Prevents the theme from 'capturing' the click on the image itself */
  }
  .text-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    padding: 2rem 1.5rem 1rem;
    background: linear-gradient(transparent, rgba(0,0,0,0.9));
    color: white;
    text-align: left;
  }
  .nav-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(5px);
    color: white;
    border: 1px solid rgba(255,255,255,0.2);
    width: 45px;
    height: 45px;
    border-radius: 50%;
    cursor: pointer;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.3); }
  .nav-prev { left: 1rem; }
  .nav-next { right: 1rem; }
</style>

{{ if gt (len $games) 0 }}
<div id="{{ $id }}" class="carousel-fixed-container">
  <div class="carousel-track">
    {{ range $games }}
    <div class="carousel-slide">
      <a href="{{ .link }}" target="_blank" class="w-full h-full flex items-center justify-center">
        <img src="{{ .url }}" alt="{{ .title }}">
        <div class="text-overlay">
          <h3 class="font-bold text-lg m-0">{{ .title }}</h3>
          <p class="text-sm opacity-80 m-0">{{ .year }}</p>
        </div>
      </a>
    </div>
    {{ end }}
  </div>

  <button class="nav-btn nav-prev" aria-label="Previous">❮</button>
  <button class="nav-btn nav-next" aria-label="Next">❯</button>
</div>

{{ $script := resources.Get "js/carousel-logic.js" | minify | fingerprint }}
<script src="{{ $script.RelPermalink }}"></script>
<script>initGameCarousel('{{ $id }}');</script>
{{ end }}
