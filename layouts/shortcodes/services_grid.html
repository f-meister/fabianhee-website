{{ $style := resources.Get "css/custom-grid.css" | minify | fingerprint }}
<link rel="stylesheet" href="{{ $style.RelPermalink }}">

{{ $data := .Site.Data.services }}

<div class="grid grid-cols-1 md:grid-cols-3 gap-2 my-12 max-w-[800px] mx-auto px-2">
  {{ range $data.services }}
  <div class="p-6 bg-neutral-50 dark:bg-neutral-800 rounded-2xl border border-neutral-200 dark:border-neutral-700 flex flex-col items-center text-center shadow-sm">
    
    {{/* Icon/Emoji */}}
    <div class="text-3xl mb-4">{{ .icon }}</div>
    
    {{/* Title */}}
    <h3 class="text-lg font-bold mb-2 dark:text-white">{{ .title }}</h3>
    
    {{/* Description */}}
    <p class="text-sm text-neutral-600 dark:text-neutral-400 mb-6 flex-grow leading-relaxed">
      {{ .description }}
    </p>
    
    {{/* Action Button */}}
    <a href="{{ .button_link }}" 
       class="px-4 py-2 bg-primary-500 text-white rounded-lg text-sm font-bold transition-colors no-underline 
              hover:bg-primary-600 hover:rounded-lg focus:rounded-lg active:rounded-lg">
      {{ .button_text }}
    </a>
    
  </div>
  {{ end }}
</div>
