<div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-2 mb-12 not-prose">
  {{ range first 2 (where .Site.RegularPages "Section" "blog") }}
    <a href="{{ .RelPermalink }}" class="group block p-6 rounded-xl border border-neutral-200 dark:border-neutral-800 hover:border-primary-500 transition-all hover:shadow-lg bg-neutral-50 dark:bg-neutral-900/50">
      
      {{/* Category Badges */}}
      <div class="flex flex-wrap gap-2 mb-3">
        {{ range .Params.categories }}
          <span class="text-[10px] font-bold uppercase tracking-widest px-2 py-1 rounded bg-primary-100 dark:bg-primary-900/30 text-primary-700 dark:text-primary-300">
            {{ . }}
          </span>
        {{ end }}
      </div>

      <h3 class="text-lg font-bold mb-2 group-hover:text-primary-600 transition-colors">{{ .Title }}</h3>
      <p class="text-sm opacity-70 mb-4 line-clamp-2 leading-relaxed">{{ .Summary }}</p>
      
      <div class="flex items-center text-xs font-semibold text-primary-600 dark:text-primary-400 uppercase tracking-wider">
        Read Entry <span class="ml-2 transition-transform group-hover:translate-x-1">→</span>
      </div>
    </a>
  {{ end }}
</div>
